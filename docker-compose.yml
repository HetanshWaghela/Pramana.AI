# ══════════════════════════════════════════════════════════════════════════════
# Pramana.ai - Docker Compose Configuration
# Full-stack deployment with Redis and PostgreSQL
# ══════════════════════════════════════════════════════════════════════════════

volumes:
  pramana-data:
    driver: local

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Redis - State streaming and caching
  # ────────────────────────────────────────────────────────────────────────────
  pramana-redis:
    image: docker.io/redis:6
    container_name: pramana-redis
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL - State persistence and task queuing
  # ────────────────────────────────────────────────────────────────────────────
  pramana-postgres:
    image: docker.io/postgres:16
    container_name: pramana-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: pramana
      POSTGRES_USER: pramana
      POSTGRES_PASSWORD: pramana_secure_password
    volumes:
      - pramana-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U pramana
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s

  # ────────────────────────────────────────────────────────────────────────────
  # Pramana.ai API - Main application
  # ────────────────────────────────────────────────────────────────────────────
  pramana-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: pramana-ai:latest
    container_name: pramana-api
    ports:
      - '8123:8000'
    depends_on:
      pramana-redis:
        condition: service_healthy
      pramana-postgres:
        condition: service_healthy
    environment:
      # ── AI Provider ──
      GROQ_API_KEY: ${GROQ_API_KEY}
      
      # ── Monitoring ──
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      
      # ── Infrastructure ──
      REDIS_URI: redis://pramana-redis:6379
      POSTGRES_URI: postgres://pramana:pramana_secure_password@pramana-postgres:5432/pramana?sslmode=disable
      
      # ── Search APIs ──
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      
      # ── MCP Configuration ──
      MCP_FILESYSTEM_ENABLED: ${MCP_FILESYSTEM_ENABLED:-true}
      MCP_FILESYSTEM_PATH: ${MCP_FILESYSTEM_PATH:-/app/workspace}
      MCP_BRAVE_SEARCH_ENABLED: ${MCP_BRAVE_SEARCH_ENABLED:-false}

# ══════════════════════════════════════════════════════════════════════════════
# Usage:
#   GROQ_API_KEY=xxx SERPAPI_API_KEY=xxx docker-compose up
#
# Access:
#   - Application: http://localhost:8123/
#   - API Docs: http://localhost:8123/docs
#
